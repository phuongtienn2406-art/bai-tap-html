<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <style type="text/css">
        body {
            background: #000000;
            padding: 0px;
            margin: 0px;
        }

        canvas {
            background: #fff;
            display: block;
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .btn-back{
            position: absolute;
            top: 1.26rem !important;
            left: .4rem;
            width: .8rem;
            height: .8rem;
            background: #fff;
            border-radius: 50%;
            transition: transform .1s linear;
            transform-origin: center center;
            box-shadow: 0 1px 3px #2388db;
            z-index: 2;
        }
        .btn-back:after{
            position: absolute;
            content: "";
            width: .24rem;
            height: .24rem;
            top: 50%;
            left: 50%;
            margin-left: -0.1rem;
            margin-top: -0.13rem;
            border: 2px solid #79a7cc;
            border-right: none;
            border-bottom: none;
            transform: rotate(-45deg);
        }
        .btn-back:active{
            transform: scale(.85);
        }
    </style>
